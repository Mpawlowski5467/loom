target-version = "py311"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501", "RUF015"]
external = ["ARG", "BLE"]

[lint.isort]
known-first-party = ["api", "agents", "compiler", "index", "rules", "bridge", "core"]

[format]
quote-style = "double"
indent-style = "space"
